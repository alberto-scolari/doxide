[workspace]
name = "doxide"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "win-64"]
version = "0.9.0"

[dependencies]
cmake = ">=3.31.0,<4"
conan = ">=2.24.0,<3"
cairo = ">=1.18.4,<2"

[pypi-dependencies]
mkdocs = ">=1.6.1, <2"
mkdocs-material = { version = ">=9.6.22, <10", extras = ["imaging"] }

[activation.env]
CFLAGS="-Wall -Wextra -Wswitch-enum -Werror=switch-enum"
CMAKE_CXX_INCLUDE_WHAT_YOU_USE="include-what-you-use"

[tasks.deploy_deps]
args = [
  { "arg" = "profile", "default" = "clang21-cpp20-dbg" },
]
cmd = "conan install --build=missing -pr {{ profile }} ."

[tasks.configure]
args = [
  { "arg" = "profile", "default" = "clang21-cpp20-dbg" },
  { "arg" = "preset", "default" = "conan-debug" },
]
depends-on = [
  { task = "deploy_deps", args = [
    { profile = "{{ profile }}" },
  ] },
]
cmd = "cmake --preset {{ preset }} -DDEPS_SOURCE_STRATEGY=auto -S ."


[tasks.build]
args = [
  { "arg" = "preset", "default" = "conan-debug" },
]
cmd = "cmake --build --preset {{ preset }} -j$(nproc)"

[tasks.docs]
cmd = "mkdocs build"

[tasks.docs_serve]
cmd = "mkdocs serve"

[tasks.run]
cmd = "$PIXI_PROJECT_ROOT/build/Debug/doxide build"

[tasks.test]
cwd = "test"
cmd = "$PIXI_PROJECT_ROOT/build/Debug/doxide build"

[tasks.lint]
cmd = "clang-format -i src/*.cpp src/*.hpp"

